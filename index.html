<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MyShop E-commerce</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>MyShop</h1>

      <div class="cart">Cart 🛒 : <span id="cart-count">0</span></div>
    </header>

    <section class="products">
      <div class="product">
        <img src="https://picsum.photos/200?1" />

        <h3>Wireless Headphones</h3>

        <p class="price">$50</p>

        <button onclick="addToCart()">Add to Cart</button>
      </div>

      <div class="product">
        <img src="https://picsum.photos/200?2" />

        <h3>Smart Watch</h3>

        <p class="price">$80</p>

        <button onclick="addToCart()">Add to Cart</button>
      </div>

      <div class="product">
        <img src="https://picsum.photos/200?3" />

        <h3>Gaming Mouse</h3>

        <p class="price">$30</p>

        <button onclick="addToCart()">Add to Cart</button>
      </div>

      <div class="product">
        <img src="https://picsum.photos/200?4" />

        <h3>Bluetooth Speaker</h3>

        <p class="price">$40</p>

        <button onclick="addToCart()">Add to Cart</button>
      </div>
    </section>

    <footer>
      <p>© 2026 MyShop E-commerce</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
