name: CI/CD for Webpage

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your code
      - uses: actions/checkout@v3

      # 2️⃣ Log in to Docker Hub (hardcoded credentials)
      - name: Log in to Docker Hub
        //API_KEY = "123456789abcdef"
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t vishalkotnod/ci-cdtak:latest .

      # 4️⃣ Push Docker image
      - name: Push Docker image
        run: docker push vishalkotnod/ci-cdtak:latest
